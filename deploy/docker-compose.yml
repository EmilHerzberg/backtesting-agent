# Backtesting Agent — production stack
#
# Designed to live ALONGSIDE the AI-Investment stack on the same host.
# The prismgate Cloudflare Tunnel container (`tunnel-prismgate` in the
# AI-Investment compose) is reused — no own tunnel container here. The CF
# Zero-Trust Dashboard (prismgate account) routes
# backtesting-agent.prismgate.net → bt-nginx:80 on the shared Docker network.
#
# Before first deploy: see DEPLOYMENT.md. The SHARED_NETWORK env var must
# match the Docker network the existing cloudflared container is attached to
# (verify on the host with `docker network ls`).

services:
  bt-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: bt-api
    env_file: ../.env
    volumes:
      - bt-data:/app/data
      - bt-snapshots:/app/data/golden:ro
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - bt-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Phase 3 — Next.js dashboard. Enable with `--profile full` once the
  # frontend slice is copied into ../frontend/.
  bt-frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-https://example.com/api}
    container_name: bt-frontend
    expose:
      - "3000"
    depends_on:
      - bt-api
    restart: unless-stopped
    networks:
      - bt-internal
    profiles:
      - full

  bt-nginx:
    image: nginx:alpine
    container_name: bt-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bt-api
    restart: unless-stopped
    networks:
      - bt-internal      # talk to bt-api / bt-frontend
      - shared           # talk to the existing cloudflared container

volumes:
  bt-data:
  bt-snapshots:

networks:
  bt-internal:
    driver: bridge
  # The bridge the existing AI-Investment cloudflared container lives on.
  # Override with SHARED_NETWORK env var if the host's Docker network name
  # differs (see DEPLOYMENT.md §"Shared network").
  shared:
    external: true
    name: ${SHARED_NETWORK:-ai-investment_default}
