# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=300r/m;

server {
    listen 80;
    server_name _;

    # -- Security Headers --
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://apache.claudecode.dev;" always;

    # -- Hide server version --
    server_tokens off;

    # -- Request size limit --
    client_max_body_size 10m;

    # -- Auth endpoints: strict rate limit (5 req/min per IP) --
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- API endpoints: general rate limit (60 req/min per IP) --
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Frontend --
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Block common scanner paths --
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~ /(wp-admin|wp-login|phpmyadmin|adminer) {
        deny all;
        return 404;
    }
}
