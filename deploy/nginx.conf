# Backtesting Agent reverse proxy.
#
# Domain is set in the Cloudflare Tunnel ingress rule, not here — nginx
# accepts any Host header (server_name _) and routes by path. The tunnel
# terminates TLS, internal traffic is plain HTTP on the shared docker net.

limit_req_zone $binary_remote_addr zone=bt_api:10m rate=300r/m;

server {
    listen 80;
    server_name _;

    # -- Security headers --
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;
    client_max_body_size 10m;

    # -- API endpoints --
    location /api/ {
        limit_req zone=bt_api burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://bt-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Phase 2 (API-only): root serves the FastAPI docs as the demo.
    #    Phase 3 will repoint this to the Next.js dashboard (bt-frontend:3000).
    location / {
        proxy_pass http://bt-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -- Block common scanner paths --
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~ /(wp-admin|wp-login|phpmyadmin|adminer) {
        deny all;
        return 404;
    }
}
