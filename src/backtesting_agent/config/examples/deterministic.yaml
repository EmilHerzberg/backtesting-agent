# Deterministic showcase backtest — fixed historical window that lives
# entirely inside the frozen snapshot (data/golden/yfinance_snapshot_*.parquet),
# so with BACKTEST_DETERMINISM_MODE=true every run is bit-for-bit reproducible.
#
# Usage:
#   BACKTEST_DETERMINISM_MODE=true python run_backtest.py \
#       --config src/backtesting_agent/config/examples/deterministic.yaml

assets:
  symbols:
    - AAPL
  asset_type: STOCK

time:
  # Explicit window (takes precedence over lookback). Inside the snapshot
  # range 2020-01-02 .. 2024-12-30.
  start: "2023-01-01"
  end: "2024-12-30"
  interval: "1d"

strategy:
  names:
    - SMACrossover
  use_generator: false

costs:
  commission_pct: 0.001
  spread_bps: 5.0
  slippage_bps: 2.0

optuna:
  n_trials: 50
  sampler: tpe
  pruner: median
  objective: composite
  composite_weights:
    sharpe: 0.6
    max_drawdown: -0.4

walk_forward:
  enabled: false

output:
  save_results: true
  db_path: "data/backtest_agent.db"
  plots: false
  plot_dir: "data/plots"
  export_csv: false

cash: 10000.0
n_workers: 0
