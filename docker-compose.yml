services:
  # ── Backend (FastAPI) ──────────────────────────────
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    env_file: .env
    volumes:
      - backend-data:/app/data  # SQLite + persistent data
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Next.js) ─────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx Reverse Proxy ────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ── Cloudflare Tunnel (HTTPS ohne offene Ports) ────
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    restart: unless-stopped
    profiles:
      - tunnel

volumes:
  backend-data:
